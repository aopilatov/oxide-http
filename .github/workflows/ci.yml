# Build, checks and publication of prebuilt artifacts.
#
# build   — a .node per platform, uploaded as an artifact;
# test    — JS tests on every LTS Node against the built binary;
# images  — installation into clean images (Ubuntu/UBI/Alpine) without a Rust toolchain;
# publish — the self-contained npm release (all binaries bundled) on a git tag.
name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  lint:
    name: Checks (clippy, fmt, types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo test
        run: cargo test
      - name: Types (library and tests)
        run: npm run typecheck

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc builds run in the napi-rs docker image with a glibc 2.17 baseline
          # (manylinux2014): the binary then also loads on older distributions.
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
          # The lts-debian image exists ONLY for amd64, so the arm64 target is
          # cross-compiled on an amd64 runner inside the dedicated lts-debian-aarch64
          # image (itself x86_64, but carrying the aarch64 rust target).
          # Running lts-debian on an arm runner yields `exec format error`.
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          # musl needs separate binaries: the addon's libc must match Node's libc.
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            artifact: oxide-http.linux-x64-musl.node
          # lts-alpine, in contrast, is multi-arch (amd64 + arm64), so arm64-musl is
          # built natively on an arm runner.
          - target: aarch64-unknown-linux-musl
            host: ubuntu-24.04-arm
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            artifact: oxide-http.linux-arm64-musl.node
          - target: aarch64-apple-darwin
            host: macos-latest
          # GitHub no longer offers macos-13 (Intel) runners — the x64 binary is
          # cross-compiled from an arm64 runner: the Apple toolchain supports both
          # targets with a single SDK.
          - target: x86_64-apple-darwin
            host: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.docker }}
        with: { targets: '${{ matrix.target }}' }
      - uses: Swatinem/rust-cache@v2
        with: { key: '${{ matrix.target }}' }

      - run: npm ci

      - name: Build (docker, glibc)
        if: ${{ matrix.docker && !contains(matrix.target, 'musl') }}
        run: |
          # rustup target add is mandatory: the image installs the target for its
          # default toolchain, while our rust-toolchain.toml pins a specific version —
          # rustup switches to it and that toolchain lacks the target
          # (error[E0463]: can't find crate for `core`).
          docker run --rm -v "$PWD":/build -w /build ${{ matrix.docker }} \
            bash -lc "rustup target add ${{ matrix.target }} \
              && npm ci --no-audit --no-fund \
              && npx napi build --platform --release --target ${{ matrix.target }}"

      # The napi-rs musl image ships Node 18 while napi CLI 3.x requires Node 20+
      # (@inquirer/core pulls styleText from node:util). We bypass the CLI and call cargo
      # directly: musl is the native target in that image anyway, so all that remains is
      # renaming the artifact per napi's convention. index.js/index.d.ts already exist.
      - name: Build (docker, musl)
        if: ${{ matrix.docker && contains(matrix.target, 'musl') }}
        run: |
          docker run --rm -v "$PWD":/build -w /build ${{ matrix.docker }} \
            sh -lc "cargo build --release && cp target/release/liboxide_http.so ${{ matrix.artifact }}"

      - name: Build (native)
        if: ${{ !matrix.docker }}
        run: |
          # An explicit target add for the same reason as in the docker build:
          # rust-toolchain.toml pins a version, and the target the action installed for
          # stable is missing there. For the host target this is a no-op.
          rustup target add ${{ matrix.target }}
          npx napi build --platform --release --target ${{ matrix.target }}

      # index.js/index.d.ts live in the repository (they must be available without a
      # build). Here we make sure the committed versions match the Rust sources.
      - name: Generated index.js/index.d.ts are up to date
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: |
          git diff --exit-code -- index.js index.d.ts || {
            echo '::error::index.js/index.d.ts drifted from the Rust sources — rebuild (npm run build) and commit'
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error

  test:
    name: Tests on Node ${{ matrix.node }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', cache: npm }
      - uses: actions/download-artifact@v4
        with: { name: bindings-x86_64-unknown-linux-gnu, path: . }
      - run: npm ci

      # The full suite runs where Node executes .ts directly (22+).
      - name: Full test suite
        if: ${{ matrix.node >= 22 }}
        run: npm test

      # On 18/20 we check the essential part — that the published artifact (CJS + .node)
      # works on that ABI version. The .ts suite cannot run there.
      - name: Smoke test of the built package
        run: |
          npm run build:ts
          node scripts/smoke.cjs

  images:
    name: Install into ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: 'ubuntu:22.04', libc: gnu, dockerfile: examples/docker/Dockerfile.ubuntu }
          - { image: 'redhat/ubi9:latest', libc: gnu, dockerfile: examples/docker/Dockerfile.ubi9 }
          - { image: 'redhat/ubi10:latest', libc: gnu, dockerfile: examples/docker/Dockerfile.ubi10 }
          - { image: 'alpine:3.20', libc: musl, dockerfile: examples/docker/Dockerfile.alpine }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/download-artifact@v4
        with: { name: 'bindings-x86_64-unknown-linux-${{ matrix.libc }}', path: . }
      - run: npm ci && npm run build:ts

      - name: Load the addon without a Rust toolchain
        run: docker build -f ${{ matrix.dockerfile }} -t oxide-smoke:${{ matrix.libc }} .

  publish:
    name: Publish
    needs: [lint, build, test, images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, registry-url: 'https://registry.npmjs.org' }
      - run: npm ci

      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      # Fat package (since 0.3.1): every prebuilt binary ships inside the root package
      # and the generated index.js picks the local one — no optionalDependencies, no
      # per-platform packages, no lockfile drift between them.
      - name: Collect binaries into the package root
        run: |
          find artifacts -name '*.node' -exec mv {} . \;
          ls -la *.node
          COUNT=$(ls *.node | wc -l)
          test "$COUNT" -eq 6 || { echo "::error::expected 6 binaries, got $COUNT"; exit 1; }

      - name: Build TypeScript
        run: npm run build:ts

      # Checks run strictly BEFORE the first publish: an npm release is irreversible,
      # a wrong version cannot be recalled (only deprecated).
      - name: The tag must match the version in package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          test "$TAG" = "$PKG" || { echo "tag $TAG != version $PKG"; exit 1; }

      - name: Smoke test before publishing
        run: node scripts/smoke.cjs

      - name: Publish the root package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

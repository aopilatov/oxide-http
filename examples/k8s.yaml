# Manifest for @oxide-ts/http. The key part is aligning the shutdown timeouts:
# terminationGracePeriodSeconds > preShutdownDelay + shutdownTimeout,
# otherwise k8s kills the pod mid-drain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      # preShutdownDelay 10s + shutdownTimeout 15s = 25s, with headroom.
      terminationGracePeriodSeconds: 40
      containers:
        - name: api
          image: registry.example.com/api:1.0.0
          ports:
            - { name: http, containerPort: 3000 }
            - { name: admin, containerPort: 9090 }   # health: { port: 9090 }

          resources:
            requests: { cpu: "1", memory: 256Mi }
            limits:   { cpu: "1", memory: 512Mi }
            # workerThreads: 'auto' reads exactly this quota (1 vCPU) rather than the
            # node's core count — otherwise tokio would spawn a worker per core.

          # Probes on the admin port: they answer from Rust and keep working even when
          # the event loop is busy or the server is overloaded.
          startupProbe:
            httpGet: { path: /healthz, port: admin }
            failureThreshold: 30
            periodSeconds: 1
          livenessProbe:
            httpGet: { path: /healthz, port: admin }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: admin }
            periodSeconds: 2
            # readyz returns 503 on: shutdown (draining), sustained overload
            # (overloaded), and via app.setReady(false) / setReadinessCheck.

          env:
            - { name: NODE_ENV, value: production }
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: http }
    # The admin port is NOT published: /metrics must not be reachable from the internet.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
